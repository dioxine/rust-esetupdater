[package]
name = "rust-esetupdater"
version = "0.1.2"
edition = "2024"

[dependencies]
log = "0.4.26"
pbr = "1.1.1"
reqwest = { version = "0.12.15", features = [
  "rustls-tls",
], default-features = false }
serde = { version = "1.0", features = ["derive"] }
serde_ini = "0.2.0"
simplelog = "0.12.2"
time = "0.3.40"
tokio = { version = "1.43.0", features = [
  "macros",
  "rt",
], default-features = false }
toml = "0.8.20"
